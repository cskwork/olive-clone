spring:
  # @ServiceConnection in PostgresIntegrationSupport auto-configures datasource
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          non_contextual_lobs: true
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 2s

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

aws:
  s3:
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test

olive:
  pg:
    provider: mock
  opensearch:
    uris: http://localhost:9200
