spring:
  main:
    allow-bean-definition-overriding: true
  # @ServiceConnection in PostgresIntegrationSupport auto-configures datasource
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          non_contextual_lobs: true
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 2s

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

management:
  endpoint:
    health:
      validate-group-members: false
      probes:
        enabled: false
      group:
        readiness:
          include: ping
        liveness:
          include: ping
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    open-search:
      enabled: false
    openSearch:
      enabled: false
    readiness:
      enabled: false

inventory:
  lock:
    fallback-to-db: true
    redis:
      enabled: false

aws:
  s3:
    endpoint: http://localhost:4566
    region: us-east-1
    access-key: test
    secret-key: test

olive:
  pg:
    provider: mock
  opensearch:
    uris: http://localhost:9200
  security:
    jwt:
      issuer: olive-commerce-test
      access-ttl: PT30M
      refresh-ttl: P14D
      private-key-location: classpath:keys/app.key
      public-key-location: classpath:keys/app.pub
