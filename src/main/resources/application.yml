spring:
  application:
    name: commerce-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/commerce
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          non_contextual_lobs: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 2s
      lettuce:
        shutdown-timeout: 100ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,postgres,redis,openSearch
          show-details: always
        liveness:
          include: livenessState,ping
          show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s

aws:
  s3:
    endpoint: http://localhost:4566
    region: ap-northeast-2
    bucket: commerce-images-local
    access-key: test
    secret-key: test

olive:
  security:
    jwt:
      issuer: olive-commerce
      access-ttl: PT30M
      refresh-ttl: P14D
      private-key-location: classpath:keys/app.key
      public-key-location: classpath:keys/app.pub
  pg:
    provider: mock
  opensearch:
    uris: http://localhost:9200
