spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/commerce
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 2s

aws:
  s3:
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test

olive:
  opensearch:
    uris: http://localhost:9200
