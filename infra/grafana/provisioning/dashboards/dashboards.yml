# Grafana dashboard provisioning (OLV-130)
apiVersion: 1

providers:
  - name: 'Commerce Backend'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
